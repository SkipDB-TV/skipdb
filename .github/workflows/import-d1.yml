name: Import dump to D1

on:
  workflow_run:
    workflows: ["Export data dump"] # triggers after the dump export workflow
    types: [completed]
  workflow_dispatch:

jobs:
  import:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Import to D1
        working-directory: deploy/cloudflare-segments-worker
        env:
          IMPORT_CF_ACCOUNT_ID: ${{ secrets.IMPORT_CF_ACCOUNT_ID }}
          IMPORT_CF_DATABASE_ID: ${{ secrets.IMPORT_CF_DATABASE_ID }}
          IMPORT_CF_API_TOKEN: ${{ secrets.IMPORT_CF_API_TOKEN }}
        run: pnpm run d1:import
